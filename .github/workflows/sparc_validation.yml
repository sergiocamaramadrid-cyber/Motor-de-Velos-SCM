name: "SCM Framework - SPARC Validation"

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          test -f requirements.txt || { echo "Error: requirements.txt not found."; exit 1; }
          pip install -r requirements.txt

      - name: Check local SPARC data
        id: check_local_data
        run: |
          TABLE_PATH="data/SPARC/SPARC_Lelli2016c.csv"
          TABLE_EXISTS="no"
          [ -f "$TABLE_PATH" ] && TABLE_EXISTS="yes"
          ROTMOD_COUNT=$(find data/SPARC/rotmod data/SPARC/raw -maxdepth 1 -type f -name "*_rotmod.dat" 2>/dev/null | xargs -r -n1 basename | sort -u | wc -l | tr -d ' ')
          if [ "$TABLE_EXISTS" = "yes" ] && [ "${ROTMOD_COUNT}" -gt 0 ]; then
            echo "local_ready=true" >> "$GITHUB_OUTPUT"
            echo "Using local SPARC data (${ROTMOD_COUNT} rotmod files found)."
          else
            echo "local_ready=false" >> "$GITHUB_OUTPUT"
            echo "Local SPARC data is incomplete (table exists: ${TABLE_EXISTS}, rotmod files: ${ROTMOD_COUNT})."
            echo "Will attempt to build catalog with remote download fallback."
          fi

      - name: Build SPARC Catalog
        run: |
          if [ -f scripts/build_sparc_full_catalog.py ]; then
            if [ "${{ steps.check_local_data.outputs.local_ready }}" = "true" ]; then
              echo "Building SPARC catalog from local inputs."
            else
              echo "Local inputs missing; attempting download-backed catalog build."
            fi

            if ! python scripts/build_sparc_full_catalog.py; then
              if [ "${{ steps.check_local_data.outputs.local_ready }}" = "false" ]; then
                echo "Error: Missing local SPARC data and download/build failed. Check network connectivity and download permissions."
              else
                echo "Error: Build failed despite local SPARC data being present. Review build logs for data validation errors."
              fi
              exit 1
            fi
          else
            echo "Error: scripts/build_sparc_full_catalog.py not found."
            exit 1
          fi

      - name: Run Framework Test
        run: |
          if [ -f scripts/run_big_sparc_veil_test.py ]; then
            python scripts/run_big_sparc_veil_test.py --catalog data/SPARC/sparc_full.csv --out results
          else
            echo "Error: scripts/run_big_sparc_veil_test.py not found."
            exit 1
          fi

      - name: Display Results Overview
        run: |
          if [ -f results/results_overview.json ]; then
            cat results/results_overview.json
          else
            echo "Error: Results file was not generated."
            exit 1
          fi

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sparc-results
          path: |
            data/SPARC/sparc_full.csv
            results/
