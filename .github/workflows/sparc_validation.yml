name: "SCM Framework - SPARC Validation"

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          test -f requirements.txt || { echo "Error: requirements.txt not found."; exit 1; }
          pip install -r requirements.txt

      - name: Check local SPARC data
        id: check_local_data
        run: |
          CATALOG_PATH="data/SPARC/sparc_full.csv"
          CSV_TABLE_PATH="data/SPARC/SPARC_Lelli2016c.csv"
          MRT_TABLE_PATH="data/SPARC/SPARC_Lelli2016c.mrt"
          TABLE_EXISTS="no"
          TABLE_SOURCE="none"
          CATALOG_EXISTS="no"
          if [ -f "$CATALOG_PATH" ]; then
            CATALOG_EXISTS="yes"
          fi
          if [ -f "$CSV_TABLE_PATH" ]; then
            TABLE_EXISTS="yes"
            TABLE_SOURCE="csv"
          elif [ -f "$MRT_TABLE_PATH" ]; then
            TABLE_EXISTS="yes"
            TABLE_SOURCE="mrt"
          fi
          ROTMOD_COUNT=0
          ROTMOD_LIST="$(mktemp)"
          if [ -d "data/SPARC/rotmod" ]; then
            find data/SPARC/rotmod -maxdepth 1 -type f -name "*_rotmod.dat" -print0 | xargs -0 -r -n1 basename >> "$ROTMOD_LIST"
          fi
          if [ -d "data/SPARC/raw" ]; then
            find data/SPARC/raw -maxdepth 1 -type f -name "*_rotmod.dat" -print0 | xargs -0 -r -n1 basename >> "$ROTMOD_LIST"
          fi
          if [ -s "$ROTMOD_LIST" ]; then
            ROTMOD_COUNT=$(sort -u "$ROTMOD_LIST" | wc -l | tr -d ' ')
          fi
          rm -f "$ROTMOD_LIST"
          if [ "$TABLE_EXISTS" = "yes" ] && [ "${ROTMOD_COUNT}" -gt 0 ]; then
            echo "local_ready=true" >> "$GITHUB_OUTPUT"
            echo "Using local SPARC data (${ROTMOD_COUNT} rotmod files found, table source: ${TABLE_SOURCE})."
          else
            echo "local_ready=false" >> "$GITHUB_OUTPUT"
            echo "Local SPARC data is incomplete (table exists: ${TABLE_EXISTS}, rotmod files: ${ROTMOD_COUNT})."
            echo "Expected table: data/SPARC/SPARC_Lelli2016c.csv or data/SPARC/SPARC_Lelli2016c.mrt"
            echo "Provide local SPARC inputs or a prebuilt data/SPARC/sparc_full.csv to continue."
          fi
          echo "catalog_ready=${CATALOG_EXISTS}" >> "$GITHUB_OUTPUT"
          if [ "$CATALOG_EXISTS" = "yes" ]; then
            echo "Using prebuilt catalog: ${CATALOG_PATH}"
          fi

      - name: Build SPARC Catalog
        run: |
          if [ -f scripts/build_sparc_full_catalog.py ]; then
            if [ "${{ steps.check_local_data.outputs.catalog_ready }}" = "true" ]; then
              echo "Prebuilt catalog detected; skipping catalog build."
            elif [ "${{ steps.check_local_data.outputs.local_ready }}" = "true" ]; then
              echo "Building SPARC catalog from local inputs."
              if ! python scripts/build_sparc_full_catalog.py; then
                echo "Error: Build failed despite local SPARC data being present. Review build logs for data validation errors."
                exit 1
              fi
            else
              echo "Error: No local SPARC inputs available."
              echo "Provide either:"
              echo "  - data/SPARC/sparc_full.csv"
              echo "  - data/SPARC/SPARC_Lelli2016c.mrt (or .csv) + data/SPARC/rotmod/*_rotmod.dat"
              exit 1
            fi
          else
            echo "Error: scripts/build_sparc_full_catalog.py not found."
            exit 1
          fi

      - name: Run Framework Test
        run: |
          mkdir -p results
          if [ -f scripts/run_big_sparc_veil_test.py ]; then
            python scripts/run_big_sparc_veil_test.py --catalog data/SPARC/sparc_full.csv --out results
          else
            echo "Error: scripts/run_big_sparc_veil_test.py not found."
            exit 1
          fi

      - name: Display Results Overview
        run: |
          if [ -f results/results_overview.json ]; then
            cat results/results_overview.json
          else
            echo "Error: Results file was not generated."
            exit 1
          fi

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sparc-results
          path: |
            data/SPARC/sparc_full.csv
            results/
