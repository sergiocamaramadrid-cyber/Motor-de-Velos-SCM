name: CI - SCM Framework

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.10", "3.11" ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          test -f requirements.txt || { echo "ERROR: requirements.txt is required for CI dependency installation. Ensure it exists at repository root."; exit 1; }
          pip install -r requirements.txt
          pip install pytest

      - name: Lint (syntax/compile smoke)
        run: |
          python -m compileall -q scripts src tests

      - name: Run tests
        run: |
          bash -n scripts/run_all_sparc_veil_test.sh
          pytest -q

      - name: Dataset validation
        run: |
          python scripts/validate_sparc_catalog.py --input data/sparc_175_master_sample.csv --out results/validation/sparc_catalog_validation_report.csv
          test -f results/validation/sparc_catalog_validation_report.csv

      - name: Regression smoke test
        run: |
          python scripts/fit_f3_linear_regression.py --input data/sparc_175_master_sample.csv --summary-out results/regression/f3_regression_summary.csv
          test -f results/regression/f3_regression_summary.csv
